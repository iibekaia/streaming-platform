<label class="flex items-center gap-3 rounded-full border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm">
  <span class="text-slate-400">Search</span>
  <input
    class="w-full bg-transparent text-slate-900 outline-none placeholder:text-slate-400"
    [ngModel]="value()"
    (ngModelChange)="valueChange.emit($event)"
    [placeholder]="placeholder()"
  />
</label>
