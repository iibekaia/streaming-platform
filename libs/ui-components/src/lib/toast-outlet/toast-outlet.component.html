<div class="pointer-events-none fixed right-4 top-4 z-50 flex w-80 flex-col gap-3">
  @for (item of store.items(); track item.id) {
    <div
      class="pointer-events-auto rounded-2xl border px-4 py-3 text-sm shadow-md"
      [class.border-red-200]="item.tone === 'error'"
      [class.bg-red-50]="item.tone === 'error'"
      [class.text-red-700]="item.tone === 'error'"
      [class.border-emerald-200]="item.tone === 'success'"
      [class.bg-emerald-50]="item.tone === 'success'"
      [class.text-emerald-700]="item.tone === 'success'"
      [class.border-slate-200]="item.tone === 'info'"
      [class.bg-white]="item.tone === 'info'"
      [class.text-slate-700]="item.tone === 'info'"
    >
      {{ item.message }}
    </div>
  }
</div>
