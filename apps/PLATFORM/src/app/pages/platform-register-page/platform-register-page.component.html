<section class="mx-auto flex min-h-screen max-w-3xl items-center px-6 py-12">
  <form [formGroup]="form" (ngSubmit)="submit()" class="w-full rounded-[2rem] border border-slate-200 bg-white p-8 shadow-xl">
    <h1 class="text-3xl font-semibold text-slate-900">Create your account</h1>
    <p class="mt-2 text-sm text-slate-500">Start with free access, then upgrade when you are ready.</p>

    <div class="mt-8 grid gap-5 md:grid-cols-2">
      <label class="block md:col-span-2">
        <span class="mb-2 block text-sm font-medium text-slate-700">Display name</span>
        <input formControlName="displayName" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
      </label>
      <label class="block md:col-span-2">
        <span class="mb-2 block text-sm font-medium text-slate-700">Email</span>
        <input formControlName="email" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-700">Password</span>
        <input type="password" formControlName="password" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-700">Confirm password</span>
        <input type="password" formControlName="confirmPassword" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
      </label>
    </div>

    @if (error()) {
      <p class="mt-4 rounded-2xl bg-red-50 px-4 py-3 text-sm text-red-700">{{ error() }}</p>
    }

    <button
      type="submit"
      class="mt-6 inline-flex items-center justify-center gap-2 rounded-2xl bg-indigo-600 px-5 py-3 font-medium text-white disabled:opacity-60"
      [disabled]="form.invalid || loading()"
    >
      @if (loading()) { <ui-spinner /> }
      Register
    </button>

    <p class="mt-6 text-sm text-slate-500">
      Already have an account?
      <a routerLink="/login" class="font-medium text-indigo-600">Sign in</a>
    </p>
  </form>
</section>
