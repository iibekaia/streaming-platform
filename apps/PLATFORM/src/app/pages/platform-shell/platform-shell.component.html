<div class="min-h-screen bg-slate-50">
  <header class="sticky top-0 z-30 border-b border-slate-200/80 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <div>
        <a routerLink="/movies" class="text-lg font-semibold text-slate-950">PLATFORM</a>
        <p class="text-sm text-slate-500">Modern streaming storefront</p>
      </div>
      <nav class="hidden gap-6 text-sm font-medium text-slate-600 md:flex">
        <a routerLink="/movies" routerLinkActive="text-indigo-600" class="inline-flex items-center gap-2">
          <svg siFilmIcon class="h-5 w-5"></svg>
          Movies
        </a>
        <a routerLink="/plans" routerLinkActive="text-indigo-600" class="inline-flex items-center gap-2">
          <svg siPlayCircleIcon class="h-5 w-5"></svg>
          Plans
        </a>
      </nav>
      <div class="flex items-center gap-3">
        <div class="rounded-full bg-violet-50 px-4 py-2 text-sm text-violet-700">{{ planLabel() }}</div>
        <a routerLink="/account" class="inline-flex items-center gap-2 rounded-full border border-slate-200 px-4 py-2 text-sm text-slate-700">
          <svg siUserCircleIcon class="h-5 w-5 text-slate-500"></svg>
          {{ userDisplay() }}
        </a>
        <button class="inline-flex items-center gap-2 rounded-full border border-slate-200 px-4 py-2 text-sm text-slate-700" (click)="logout()">
          <svg siArrowLeftOnRectangleIcon class="h-4 w-4"></svg>
          Sign out
        </button>
      </div>
    </div>
    @if (auth.sessionMessage()) {
      <div class="border-t border-red-100 bg-red-50 px-6 py-3 text-center text-sm text-red-700">
        {{ auth.sessionMessage() }}
      </div>
    }
  </header>
  <main class="mx-auto max-w-7xl px-6 py-8">
    <router-outlet />
  </main>
</div>
