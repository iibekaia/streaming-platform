@if (summary()) {
  <section class="space-y-6">
    <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
      <article class="rounded-[2rem] bg-white p-6 shadow-sm" *ngFor="let stat of stats">
        <p class="text-sm text-slate-500">{{ stat.label }}</p>
        <h2 class="mt-2 text-3xl font-semibold text-slate-950">{{ stat.value }}</h2>
      </article>
    </div>

    <div class="grid gap-6 xl:grid-cols-[1.2fr_0.8fr]">
      <article class="rounded-[2rem] bg-white p-6 shadow-sm">
        <h2 class="text-xl font-semibold text-slate-950">Signups per week</h2>
        <div class="mt-6 grid grid-cols-4 gap-4">
          @for (point of summary()!.signupSeries; track point.label) {
            <div class="flex flex-col items-center gap-3">
              <div class="flex h-44 w-full items-end rounded-[1.5rem] bg-slate-100 p-2">
                <div class="w-full rounded-[1rem] bg-indigo-600" [style.height.%]="point.value * 10"></div>
              </div>
              <span class="text-sm text-slate-500">{{ point.label }}</span>
            </div>
          }
        </div>
      </article>

      <article class="rounded-[2rem] bg-white p-6 shadow-sm">
        <h2 class="text-xl font-semibold text-slate-950">Recent activity</h2>
        <div class="mt-4 space-y-4">
          @for (item of summary()!.recentActivity; track item.id) {
            <div class="rounded-2xl border border-slate-200 px-4 py-3">
              <p class="font-medium text-slate-900">{{ item.title }}</p>
              <p class="text-sm text-slate-500">{{ item.meta }}</p>
            </div>
          }
        </div>
      </article>
    </div>
  </section>
}
