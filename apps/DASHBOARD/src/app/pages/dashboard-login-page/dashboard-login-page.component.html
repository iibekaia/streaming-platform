<section class="flex min-h-screen items-center justify-center bg-slate-100 px-6 py-12">
  <form [formGroup]="form" (ngSubmit)="submit()" class="w-full max-w-lg rounded-[2rem] bg-white p-8 shadow-xl">
    <p class="text-sm uppercase tracking-[0.3em] text-indigo-600">Admin</p>
    <h1 class="mt-3 text-3xl font-semibold text-slate-950">Dashboard sign in</h1>
    <p class="mt-2 text-sm text-slate-500">Use <code>admin@example.com / Admin123!</code>.</p>

    <div class="mt-8 space-y-5">
      <input formControlName="email" class="w-full rounded-2xl border border-slate-200 px-4 py-3" />
      <input type="password" formControlName="password" class="w-full rounded-2xl border border-slate-200 px-4 py-3" />
    </div>

    @if (error()) {
      <p class="mt-4 rounded-2xl bg-red-50 px-4 py-3 text-sm text-red-700">{{ error() }}</p>
    }

    <button class="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-slate-950 px-4 py-3 text-white" [disabled]="form.invalid || loading()">
      @if (loading()) { <ui-spinner /> }
      Enter dashboard
    </button>
  </form>
</section>
