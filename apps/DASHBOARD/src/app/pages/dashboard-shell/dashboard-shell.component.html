<div class="min-h-screen bg-slate-100 lg:grid lg:grid-cols-[260px_1fr]">
  <aside class="border-b border-slate-200 bg-slate-950 p-6 text-white lg:min-h-screen lg:border-b-0 lg:border-r">
    <h1 class="text-2xl font-semibold">DASHBOARD</h1>
    <p class="mt-2 text-sm text-slate-400">Content and revenue operations</p>
    <nav class="mt-8 grid gap-2 text-sm">
      <a routerLink="/dashboard" routerLinkActive="bg-white/10" class="inline-flex items-center gap-3 rounded-2xl px-4 py-3"><svg siChartBarSquareIcon class="h-5 w-5"></svg>Overview</a>
      <a routerLink="/movies" routerLinkActive="bg-white/10" class="inline-flex items-center gap-3 rounded-2xl px-4 py-3"><svg siFilmIcon class="h-5 w-5"></svg>Movies</a>
      <a routerLink="/categories" routerLinkActive="bg-white/10" class="inline-flex items-center gap-3 rounded-2xl px-4 py-3"><svg siTagIcon class="h-5 w-5"></svg>Categories</a>
      <a routerLink="/users" routerLinkActive="bg-white/10" class="inline-flex items-center gap-3 rounded-2xl px-4 py-3"><svg siUsersIcon class="h-5 w-5"></svg>Users</a>
      <a routerLink="/plans" routerLinkActive="bg-white/10" class="inline-flex items-center gap-3 rounded-2xl px-4 py-3"><svg siCreditCardIcon class="h-5 w-5"></svg>Plans</a>
    </nav>
  </aside>
  <main class="p-6 lg:p-8">
    <div class="mb-6 flex items-center justify-between rounded-[2rem] bg-white px-6 py-4 shadow-sm">
      <div>
        <p class="text-sm text-slate-500">Signed in as</p>
        <h2 class="font-semibold text-slate-950">{{ auth.user()?.displayName }}</h2>
      </div>
      <button class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 px-4 py-2 text-sm" (click)="logout()">
        <svg siArrowLeftOnRectangleIcon class="h-4 w-4"></svg>
        Sign out
      </button>
    </div>
    <router-outlet />
  </main>
</div>
